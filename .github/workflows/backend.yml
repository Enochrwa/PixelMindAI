name: Backend CI/CD

on:
  push:
    branches: [main, develop, feature/sprint-one-implementation, feature/folder-restructure, feature/sprint-two-implementation]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev tools
        run: |
          pip install ruff mypy \
            pydantic pydantic-settings pyjwt passlib sqlalchemy asyncpg \
            arq redis boto3 pillow fastapi email-validator --break-system-packages

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        # Run from inside backend so 'app' is the top-level package
        run: mypy app --ignore-missing-imports --explicit-package-bases

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pixelmind
          POSTGRES_PASSWORD: pixelmind_test
          POSTGRES_DB: pixelmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://pixelmind:pixelmind_test@localhost/pixelmind_test
      DATABASE_URL_POOLED: postgresql+asyncpg://pixelmind:pixelmind_test@localhost/pixelmind_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: test-secret-key-for-ci-pipeline-only-32c
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends tesseract-ocr libmagic1

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt \
            pytest pytest-asyncio pytest-cov httpx \
            email-validator \
            --break-system-packages

      - name: Run migrations
        run: alembic upgrade head || echo "No migrations to run"

      - name: Run unit tests
        run: |
          pytest tests/ -v \
            --ignore=tests/integration \
            -m "not integration" \
            --override-ini="addopts="

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v \
            -m "not integration" \
            --override-ini="addopts="

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: backend
        continue-on-error: true

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        # Render auto-deploys on push by default; this hook gives us an explicit,
        # test-gated trigger instead of relying on Render's own (untested) auto-deploy.
        # Create the hook in Render dashboard → service → Settings → Deploy Hook,
        # and store the URL as the RENDER_DEPLOY_HOOK_URL repo secret.
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set — skipping deploy trigger."
            exit 0
          fi
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
