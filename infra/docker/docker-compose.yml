# Local development stack — API + Worker only.
# Postgres (Aiven) and Redis (Upstash) are hosted services — no local
# containers for them. Both services load backend/.env directly, so the
# same .env file is used whether you run the backend via Docker or directly
# with uvicorn/arq.
services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: pixelmind_api
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file:
      - ../../backend/.env
    environment:
      ENVIRONMENT: development
      DEBUG: 'true'
    volumes:
      - ../../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: pixelmind_worker
    restart: unless-stopped
    env_file:
      - ../../backend/.env
    environment:
      ENVIRONMENT: development
    volumes:
      - ../../backend:/app
    command: python -m arq app.workers.worker.WorkerSettings

